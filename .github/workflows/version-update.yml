name: Smart Cache Busting
on:
  push:
    branches: [ main ]

jobs:
  versioning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 # 差分比較のために直近2つのコミットを取得

      - name: Update changed files version
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          VERSION=$(git rev-parse --short HEAD)
          
          echo "Changes detected in: $CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "style.css"; then
            sed -i "s/style.css?v=[^\"]*/style.css?v=$VERSION/g" ./*.html
            sed -i "s/style.css?v=[^\"]*/style.css?v=$VERSION/g" ./jp/*.html
            echo "Updated style.css version in HTML files."
          fi

          if echo "$CHANGED_FILES" | grep -q "about.css"; then
            sed -i "s/about.css?v=[^\"]*/about.css?v=$VERSION/g" ./*.html
            sed -i "s/about.css?v=[^\"]*/about.css?v=$VERSION/g" ./jp/*.html
            echo "Updated about.css version in HTML files."
          fi

          if echo "$CHANGED_FILES" | grep -q "howto.css"; then
            sed -i "s/howto.css?v=[^\"]*/howto.css?v=$VERSION/g" ./*.html
            sed -i "s/howto.css?v=[^\"]*/howto.css?v=$VERSION/g" ./jp/*.html
            echo "Updated howto.css version in HTML files."
          fi

          if echo "$CHANGED_FILES" | grep -q "policy.css"; then
            sed -i "s/policy.css?v=[^\"]*/policy.css?v=$VERSION/g" ./*.html
            sed -i "s/policy.css?v=[^\"]*/policy.css?v=$VERSION/g" ./jp/*.html
            echo "Updated policy.css version in HTML files."
          fi

          if echo "$CHANGED_FILES" | grep -q "news.css"; then
            sed -i "s/news.css?v=[^\"]*/news.css?v=$VERSION/g" ./*.html
            sed -i "s/news.css?v=[^\"]*/news.css?v=$VERSION/g" ./jp/*.html
            echo "Updated news.css version in HTML files."
          fi

          if echo "$CHANGED_FILES" | grep -q "blog.css"; then
            sed -i "s/blog.css?v=[^\"]*/blog.css?v=$VERSION/g" ./*.html
            sed -i "s/blog.css?v=[^\"]*/blog.css?v=$VERSION/g" ./jp/*.html
            echo "Updated blog.css version in HTML files."
          fi

          if echo "$CHANGED_FILES" | grep -q "script.js"; then
            sed -i "s/script.js?v=[^\"]*/script.js?v=$VERSION/g" ./*.html
            sed -i "s/script.js?v=[^\"]*/script.js?v=$VERSION/g" ./jp/*.html
            # script.js 本体の内部バージョンも更新してlocalStorageを制御
            sed -i "s/const CURRENT_VERSION = '[^']*'/const CURRENT_VERSION = '$VERSION'/g" ./static/script/script.js
            echo "Updated script.js version and internal constant."
          fi

      - name: Commit and Push
        run: |
          VERSION=$(git rev-parse --short HEAD)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 差分がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: smart versioning [$VERSION]" && git push)
